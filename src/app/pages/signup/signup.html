<div class="container d-flex justify-content-center align-items-center" style="min-height: 80vh;">
  <div class="card p-4 shadow bg-dark text-white" style="width: 400px; border: 1px solid #333;">
    <h2 class="text-center mb-4">Signup</h2>
    
    <div *ngIf="errorMessage" class="alert alert-danger">{{ errorMessage }}</div>
    <div *ngIf="successMessage" class="alert alert-success">{{ successMessage }}</div>

    <form [formGroup]="signupForm" (ngSubmit)="onSubmit()">
      <div class="mb-3">
        <label class="form-label">Username</label>
        <input type="text" formControlName="username" class="form-control bg-dark text-white border-secondary" placeholder="Enter username">
      </div>

      <div class="mb-3">
        <label class="form-label">Email</label>
        <input type="email" formControlName="email" class="form-control bg-dark text-white border-secondary" placeholder="Enter email">
        <small *ngIf="signupForm.get('email')?.touched && signupForm.get('email')?.invalid" class="text-secondary">
          Please enter a valid email.
        </small>
      </div>

      <div class="mb-3">
        <label class="form-label">Password</label>
        <input type="password" formControlName="password" class="form-control bg-dark text-white border-secondary" placeholder="Enter password">
      </div>

      <button type="submit" [disabled]="signupForm.invalid" class="btn btn-primary w-100">Signup</button>
    </form>

    <p class="mt-3 text-center">
      Already have an account? <a routerLink="/login" class="text-info">Login here</a>
    </p>
  </div>
</div>

<div class="container mt-5">
  <div class="card bg-dark text-white shadow border-secondary mx-auto" style="max-width: 600px;">
    <div class="card-header border-secondary d-flex justify-content-between align-items-center">
      <h4 class="mb-0">Employee Details</h4>
      <button class="btn btn-outline-info btn-sm" routerLink="/employees">Back to List</button>
    </div>
    <div class="card-body" *ngIf="employee">
      <div class="row mb-3">
        <div class="col-sm-4 text-secondary">Full Name:</div>
        <div class="col-sm-8 text-info fw-bold">{{ employee.first_name }} {{ employee.last_name }}</div>
      </div>
      <div class="row mb-3">
        <div class="col-sm-4 text-secondary">Email:</div>
        <div class="col-sm-8">{{ employee.email }}</div>
      </div>
      <div class="row mb-3">
        <div class="col-sm-4 text-secondary">Designation:</div>
        <div class="col-sm-8">{{ employee.designation }}</div>
      </div>
      <div class="row mb-3">
        <div class="col-sm-4 text-secondary">Department:</div>
        <div class="col-sm-8">{{ employee.department }}</div>
      </div>
      <div class="row mb-3">
        <div class="col-sm-4 text-secondary">Salary:</div>
        <div class="col-sm-8">${{ employee.salary }}</div>
      </div>
      <div class="row mb-3">
        <div class="col-sm-4 text-secondary">Joined:</div>
        <div class="col-sm-8">{{ employee.date_of_joining }}</div>
      </div>
    </div>
  </div>
</div>

<div class="container mt-5">
  <div class="card p-4 bg-dark text-white shadow border-secondary mx-auto" style="max-width: 700px;">
    <h3 class="mb-4">Update Employee</h3>
    <form [formGroup]="updateForm" (ngSubmit)="onSubmit()">
      <div class="row mb-3">
        <div class="col-md-6">
          <label class="form-label">First Name</label>
          <input type="text" formControlName="first_name" class="form-control bg-dark text-white border-secondary">
        </div>
        <div class="col-md-6">
          <label class="form-label">Last Name</label>
          <input type="text" formControlName="last_name" class="form-control bg-dark text-white border-secondary">
        </div>
      </div>
      <div class="mb-3">
        <label class="form-label">Designation</label>
        <input type="text" formControlName="designation" class="form-control bg-dark text-white border-secondary">
      </div>
      
      <div class="d-flex justify-content-end mt-4">
        <button type="button" class="btn btn-outline-secondary me-2" routerLink="/employees">Cancel</button>
        <button type="submit" class="btn btn-warning" [disabled]="updateForm.invalid">Update Details</button>
      </div>
    </form>
  </div>
</div>
